<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;
  --primary:#e94560;--primary-hover:#c73650;
  --text:#eee;--text-dim:#888;--border:#0f3460;
  --user-bubble:#2d4059;--ai-bubble:#1a1a2e;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  height:100vh;display:flex;flex-direction:column;
  background:var(--bg);color:var(--text);overflow:hidden;
}
#messages{
  flex:1;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar{width:6px}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.msg{max-width:85%;padding:10px 14px;border-radius:12px;line-height:1.5;font-size:14px;word-break:break-word}
.msg.user{align-self:flex-end;background:var(--user-bubble);border-bottom-right-radius:4px}
.msg.ai{align-self:flex-start;background:var(--ai-bubble);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.ai img{max-width:100%;border-radius:8px;margin:6px 0;cursor:pointer}
.msg.ai pre{background:#0d0d1a;padding:10px;border-radius:6px;overflow-x:auto;margin:8px 0;font-size:13px}
.msg.ai code{background:#0d0d1a;padding:2px 6px;border-radius:4px;font-size:13px}
.msg.ai pre code{background:none;padding:0}
.msg.ai p{margin:6px 0}
.msg.ai ul,.msg.ai ol{margin:6px 0 6px 20px}
.msg.ai table{border-collapse:collapse;width:100%;margin:8px 0}
.msg.ai th,.msg.ai td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.msg.ai th{background:var(--surface2)}
.msg.ai h1,.msg.ai h2,.msg.ai h3{margin:10px 0 6px}
.msg.ai blockquote{border-left:3px solid var(--primary);padding-left:12px;margin:8px 0;color:var(--text-dim)}
.msg.ai strong{color:#fff}
.msg.ai em{color:#ccc}
.msg.ai a{color:var(--primary);text-decoration:none}
.msg.ai a:hover{text-decoration:underline}

.typing{display:flex;gap:4px;padding:4px 0}
.typing span{width:8px;height:8px;background:var(--text-dim);border-radius:50%;animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{opacity:.3;transform:translateY(-4px)}}

#input-area{
  padding:12px 16px;background:var(--surface);
  border-top:1px solid var(--border);
}
.floating-actions{
  position:fixed;right:16px;top:50%;
  transform:translateY(-50%);
  display:flex;flex-direction:column;gap:12px;
  z-index:100;
}
.floating-btn{
  width:48px;height:120px;border-radius:12px;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
  transition:all 0.2s;
  writing-mode:vertical-rl;text-orientation:upright;
  letter-spacing:3px;
}
.screenshot-btn{
  background:linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
  color:#fff;font-size:13px;font-weight:600;
}
.screenshot-btn:hover{
  transform:translateX(-4px);
  box-shadow:0 6px 20px rgba(233,69,96,0.5);
}
.screenshot-btn:active{
  transform:translateX(-2px);
}
.screenshot-btn:disabled{
  opacity:0.5;cursor:not-allowed;
  transform:none;
}
#image-preview{
  display:flex;gap:8px;padding-bottom:8px;flex-wrap:wrap;
}
#image-preview .thumb{
  position:relative;display:inline-block;
}
#image-preview .thumb img{
  width:64px;height:64px;object-fit:cover;border-radius:8px;border:2px solid var(--border);
}
#image-preview .thumb .remove{
  position:absolute;top:-6px;right:-6px;width:20px;height:20px;
  background:var(--primary);border:none;border-radius:50%;color:#fff;
  font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.input-row{display:flex;gap:8px;align-items:center}
#input{
  flex:1;padding:10px 14px;border:1px solid var(--border);
  border-radius:8px;background:var(--bg);color:var(--text);
  font-size:14px;outline:none;resize:none;
  font-family:inherit;min-height:40px;max-height:120px;
}
#input:focus{border-color:var(--primary)}
#input::placeholder{color:var(--text-dim)}
.btn{
  width:40px;height:40px;border:none;border-radius:8px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:all .15s;flex-shrink:0;
}
.btn:hover{transform:scale(1.05)}
.btn:active{transform:scale(.95)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-secondary.active{background:var(--primary);border-color:var(--primary)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

#welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:12px;color:var(--text-dim);text-align:center;
}
#welcome h2{color:var(--text);font-size:20px}
#welcome p{font-size:14px;max-width:300px;line-height:1.6}


</style>
</head>
<body>
<div class="floating-actions">
  <button id="screenshot-btn" class="floating-btn screenshot-btn" onclick="triggerScreenshot()">截图求助</button>
</div>



<div id="messages">
  <div id="welcome">
    <h2>AI 助手</h2>
    <p>输入文字、上传图片或语音提问，帮你填写表单</p>
  </div>
</div>
<div id="input-area">
  <div id="image-preview"></div>
  <div class="input-row">
    <button class="btn btn-secondary" id="btn-image" title="上传图片">📎</button>
    <textarea id="input" rows="1" placeholder="输入你的问题..."></textarea>
    <button class="btn btn-secondary" id="btn-voice" title="语音输入">🎤</button>
    <button class="btn btn-primary" id="btn-send" title="发送">➤</button>
  </div>
</div>
<input type="file" id="file-input" accept="image/*" style="display:none">

<script>
var API = "__DIFY_API_PROXY__";
var TOKEN = "__DIFY_TOKEN__";
var USER = "__DIFY_USER__";
var USE_PROXY = (API === "");
var BASE_URL = USE_PROXY ? "" : API;

var conversationId = null;
var pendingFiles = [];
var isStreaming = false;
var audioRecorder = null;

var messagesEl = document.getElementById("messages");
var inputEl = document.getElementById("input");
var btnSend = document.getElementById("btn-send");
var btnVoice = document.getElementById("btn-voice");
var btnImage = document.getElementById("btn-image");
var fileInput = document.getElementById("file-input");
var imagePreview = document.getElementById("image-preview");
var welcomeEl = document.getElementById("welcome");

function log(tag, msg) {
  var time = new Date().toLocaleTimeString();
  console.log("[" + time + "] " + tag + " " + msg);
}

log("init", "proxy=" + USE_PROXY + ", base=" + BASE_URL);

window.currentFormUrl = "";

inputEl.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
inputEl.addEventListener("input", function() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
});
btnSend.addEventListener("click", send);
btnVoice.addEventListener("click", toggleVoice);
btnImage.addEventListener("click", function() { fileInput.click(); });
fileInput.addEventListener("change", handleFileSelect);

function removeWelcome() { if (welcomeEl) welcomeEl.remove(); }

function addMessage(role, content, isHtml) {
  removeWelcome();
  var div = document.createElement("div");
  div.className = "msg " + role;
  if (isHtml) div.innerHTML = content;
  else div.textContent = content;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addTyping() {
  removeWelcome();
  var div = document.createElement("div");
  div.className = "msg ai";
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function escapeHtml(text) {
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function simpleMarkdown(text) {
  if (!text) return "";
  var html = text;
  html = html.replace(/```([\s\S]*?)```/g, function(_, code) {
    return "<pre><code>" + escapeHtml(code.trim()) + "</code></pre>";
  });
  html = html.replace(/`([^`]+)`/g, function(_, c) {
    return "<code>" + escapeHtml(c) + "</code>";
  });
  html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
  html = html.replace(/^### (.+)$/gm, "<h3>$1</h3>");
  html = html.replace(/^## (.+)$/gm, "<h2>$2</h2>");
  html = html.replace(/^# (.+)$/gm, "<h1>$1</h1>");
  html = html.replace(/^&gt; (.+)$/gm, "<blockquote>$1</blockquote>");
  html = html.replace(/^[-*] (.+)$/gm, "<li>$1</li>");
  html = html.replace(/(<li>[\s\S]*?<\/li>)+/g, function(match) {
    if (match.indexOf("<ul>") === -1) return "<ul>" + match + "</ul>";
    return match;
  });
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  html = html.replace(/\|(.+)\|/g, function(match, content) {
    var cells = content.split("|").map(function(c) { return c.trim(); });
    if (cells.every(function(c) { return /^-+$/.test(c); })) return "";
    var row = "<tr>";
    cells.forEach(function(c) { row += "<td>" + c + "</td>"; });
    row += "</tr>";
    return row;
  });
  html = html.replace(/(<tr>[\s\S]*?<\/tr>)+/g, function(match) {
    return "<table>" + match + "</table>";
  });
  html = html.replace(/\n/g, "<br>");
  return html;
}

async function apiFetch(path, options) {
  var url = "/api/" + path;
  var token = TOKEN;

  log("fetch", url);
  try {
    var resp = await fetch(url, {
      ...options,
      headers: {
        ...options.headers,
        "Authorization": "Bearer " + token
      }
    });
    log("fetch", resp.status + " " + resp.statusText);
    return resp;
  } catch (e) {
    log("fetch", "ERROR: " + e.message);
    throw e;
  }
}

async function uploadFile(file) {
  log("upload", file.name + " " + file.type + " " + file.size + " bytes");
  try {
    var formData = new FormData();
    formData.append("file", file);
    formData.append("user", USER);
    
    log("upload", "calling apiFetch v1/files/upload");
    var resp = await apiFetch("v1/files/upload", {
      method: "POST",
      body: formData,
    });
    
    log("upload", "response status: " + resp.status);
    var result = await resp.json();
    log("upload", JSON.stringify(result));
    if (!resp.ok || !result.id) {
      throw new Error("上传失败: " + (result.message || resp.status));
    }
    return result;
  } catch (e) {
    log("upload", "ERROR: " + e.message);
    throw e;
  }
}

async function processStream(body, onMessage, onEnd, onError) {
  var reader = body.getReader();
  var decoder = new TextDecoder();
  var buffer = "";
  while (true) {
    var result = await reader.read();
    if (result.done) break;
    buffer += decoder.decode(result.value, { stream: true });
    var lines = buffer.split("\n");
    buffer = lines.pop() || "";
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (line.startsWith("data: ")) {
        var jsonStr = line.slice(6).trim();
        if (jsonStr === "[DONE]") { onEnd(); return; }
        if (jsonStr) {
          try {
            var event = JSON.parse(jsonStr);
            log("stream", event.event);
            if (event.event === "message") { onMessage(event.answer || ""); }
            else if (event.event === "message_end") {
              conversationId = event.conversation_id;
              log("stream", "conv_id=" + conversationId);
              onEnd();
              return;
            }
            else if (event.event === "error") { onError(event.message || "未知错误"); return; }
          } catch (e) {}
        }
      }
    }
  }
}

async function send() {
  if (isStreaming) return;
  var text = inputEl.value.trim();
  if (!text && pendingFiles.length === 0) return;

  var userContent = text;
  for (var i = 0; i < pendingFiles.length; i++) {
    userContent += '<br><img src="' + pendingFiles[i].dataUrl + '" style="max-width:200px;border-radius:8px;margin-top:4px">';
  }
  addMessage("user", userContent, true);
  inputEl.value = "";
  inputEl.style.height = "auto";

  var files = [];
  var uploadErrors = [];
  for (var i = 0; i < pendingFiles.length; i++) {
    try {
      var f = pendingFiles[i];
      var result = await uploadFile(f.file);
      if (result.id) {
        files.push({ type: "image", transfer_method: "local_file", upload_file_id: result.id });
      } else {
        uploadErrors.push(f.name + ": " + (result.message || "未知错误"));
      }
    } catch (e) {
      uploadErrors.push(e.message);
    }
  }
  if (uploadErrors.length > 0) {
    addMessage("ai", "<span style='color:#e94560'>图片上传失败:<br>" + uploadErrors.join("<br>") + "</span>", true);
    isStreaming = false;
    btnSend.disabled = false;
    return;
  }
  pendingFiles = [];
  imagePreview.innerHTML = "";
  log("send", "files=" + JSON.stringify(files));

  isStreaming = true;
  btnSend.disabled = true;
  var aiMsg = addTyping();
  var fullAnswer = "";

  try {
    var body = { query: text, response_mode: "streaming", user: USER, inputs: {} };
    if (conversationId) body.conversation_id = conversationId;
    if (files.length > 0) body.files = files;
    log("send", JSON.stringify(body));

    var resp = await apiFetch("v1/chat-messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      var errBody = await resp.text();
      log("send", "error: " + errBody);
      throw new Error("HTTP " + resp.status + ": " + errBody);
    }

    var stream = resp.body;
    aiMsg.innerHTML = "";
    fullAnswer = "";

    await processStream(stream,
      function(answer) {
        fullAnswer += answer;
        aiMsg.innerHTML = simpleMarkdown(fullAnswer);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      },
      function() {},
      function(msg) {
        fullAnswer += "<br><span style='color:#e94560'>错误: " + msg + "</span>";
        aiMsg.innerHTML = simpleMarkdown(fullAnswer);
      }
    );
  } catch (error) {
    aiMsg.innerHTML = simpleMarkdown("<span style='color:#e94560'>发送失败: " + error.message + "</span>");
  }

  isStreaming = false;
  btnSend.disabled = false;
}

function toggleVoice() {
  if (audioRecorder) {
    audioRecorder.stop();
    var float32Chunks = audioRecorder.chunks;
    var totalLen = 0;
    for (var i = 0; i < float32Chunks.length; i++) totalLen += float32Chunks[i].length;
    log("voice", "recorded " + totalLen + " samples");
    var pcm = new Float32Array(totalLen);
    var offset = 0;
    for (var i = 0; i < float32Chunks.length; i++) {
      pcm.set(float32Chunks[i], offset);
      offset += float32Chunks[i].length;
    }
    var wavBlob = float32ToWav(pcm, audioRecorder.ctx.sampleRate);
    log("voice", "wav " + wavBlob.size + " bytes, " + wavBlob.type);
    audioRecorder = null;
    btnVoice.classList.remove("active");
    btnVoice.textContent = "🎤";
    audioToText(wavBlob);
  } else {
    startRecording();
  }
}

async function startRecording() {
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      alert("您的浏览器不支持语音输入功能。\n\n请使用支持麦克风的现代浏览器，或检查是否在打包应用的限制环境中。");
      return;
    }
    var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var source = audioCtx.createMediaStreamSource(stream);
    var processor = audioCtx.createScriptProcessor(4096, 1, 1);
    var silence = audioCtx.createGain();
    silence.gain.value = 0;
    var chunks = [];

    source.connect(processor);
    processor.connect(silence);
    silence.connect(audioCtx.destination);

    processor.onaudioprocess = function(e) {
      var channelData = e.inputBuffer.getChannelData(0);
      var float32 = new Float32Array(channelData.length);
      for (var i = 0; i < channelData.length; i++) float32[i] = channelData[i];
      chunks.push(float32);
    };

    audioRecorder = {
      ctx: audioCtx, source: source, processor: processor, silence: silence, stream: stream, chunks: chunks,
      stop: function() {
        processor.disconnect();
        source.disconnect();
        silence.disconnect();
        stream.getTracks().forEach(function(t) { t.stop(); });
        audioCtx.close();
      }
    };

    btnVoice.classList.add("active");
    btnVoice.textContent = "⏹";
    log("voice", "recording started");
  } catch (e) {
    log("voice", "getUserMedia error: " + e.name);
    if (e.name === "NotAllowedError") {
      alert("无法访问麦克风，请确保：\n\n1. macOS: 系统偏好设置 → 安全性与隐私 → 隐私 → 麦克风 → 允许本应用\n2. Windows: Windows 设置 → 隐私 → 麦克风 → 允许应用访问");
    } else {
      alert("语音输入失败: " + e.message + "\n\n请检查：\n1. 应用是否有麦克风权限\n2. 浏览器是否支持 getUserMedia\n3. 是否在打包环境中运行（WKWebView 限制）");
    }
  }
}

function float32ToWav(pcm, sampleRate) {
  var numChannels = 1;
  var bitDepth = 16;
  var bytesPerSample = 2;
  var blockAlign = numChannels * bytesPerSample;
  var dataSize = pcm.length * blockAlign;
  var bufferSize = 44 + dataSize;
  var buffer = new ArrayBuffer(bufferSize);
  var view = new DataView(buffer);
  function writeStr(o, s) { for (var i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); }
  writeStr(0, "RIFF");
  view.setUint32(4, bufferSize - 8, true);
  writeStr(8, "WAVE");
  writeStr(12, "fmt ");
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * blockAlign, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitDepth, true);
  writeStr(36, "data");
  view.setUint32(40, dataSize, true);
  var offset = 44;
  for (var i = 0; i < pcm.length; i++) {
    var s = Math.max(-1, Math.min(1, pcm[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    offset += 2;
  }
  return new Blob([buffer], { type: "audio/wav" });
}

async function audioToText(audioBlob) {
  log("audio", "sending wav " + audioBlob.size + " bytes");
  btnVoice.disabled = true;
  btnVoice.textContent = "⏳";
  try {
    var formData = new FormData();
    formData.append("file", audioBlob, "recording.wav");
    formData.append("user", USER);
    var resp = await apiFetch("v1/audio-to-text", {
      method: "POST",
      body: formData,
    });
    var result = await resp.json();
    log("audio", JSON.stringify(result));
    if (!resp.ok) {
      throw new Error(result.message || ("HTTP " + resp.status));
    }
    if (result.text) {
      inputEl.value += result.text;
      inputEl.dispatchEvent(new Event("input"));
    } else {
      throw new Error("未返回识别结果");
    }
  } catch (e) {
    log("audio", "ERROR: " + e.message);
    alert("语音转文字失败: " + e.message);
  }
  btnVoice.disabled = false;
  btnVoice.textContent = "🎤";
  btnVoice.classList.remove("active");
}

function handleFileSelect(e) {
  var files = Array.from(e.target.files);
  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    if (!file.type.startsWith("image/")) continue;
    log("image", "added " + file.name + " (" + file.size + ")");
    (function(f, idx) {
      var reader = new FileReader();
      reader.onload = function(ev) {
        pendingFiles.push({ file: f, dataUrl: ev.target.result });
        var thumb = document.createElement("div");
        thumb.className = "thumb";
        thumb.innerHTML = '<img src="' + ev.target.result + '"><button class="remove" onclick="removeImage(this)">×</button>';
        thumb.fileIndex = pendingFiles.length - 1;
        imagePreview.appendChild(thumb);
      };
      reader.readAsDataURL(f);
    })(file, pendingFiles.length);
  }
  fileInput.value = "";
}

function removeImage(btn) {
  var idx = parseInt(btn.parentElement.fileIndex);
  if (!isNaN(idx) && idx < pendingFiles.length) {
    pendingFiles.splice(idx, 1);
  }
  btn.parentElement.remove();
}

var _catalogCache = null;

async function getCatalog() {
  if (_catalogCache) return _catalogCache;
  var resp = await fetch("/api/catalog");
  _catalogCache = await resp.text();
  return _catalogCache;
}

function buildRefCard(frag, reason) {
  var h = '<div data-ref-card style="background:#16213e;border:1px solid #0f3460;border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:13px">';
  h += '<div style="color:#e94560;font-weight:600;margin-bottom:4px">📋 ' + (frag.step_label || '') + ' · ' + (frag.title || '') + '</div>';
  if (reason) h += '<div style="color:var(--text-dim);font-size:12px;margin-bottom:6px">匹配依据: ' + reason + '</div>';
  var imgs = frag.all_images || (frag.image_file ? [frag.image_file] : []);
  if (imgs.length > 0) {
    h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">';
    for (var i = 0; i < imgs.length; i++) {
      if (imgs[i]) h += '<img src="/ref-image?path=' + encodeURIComponent(imgs[i]) + '" style="height:80px;border-radius:6px;border:1px solid var(--border);cursor:pointer" onclick="window.open(this.src,\'_blank\')" onerror="this.style.display=\'none\'">';
    }
    h += '</div>';
  }
  if (frag.tips) h += '<div style="color:#ff6b6b;font-size:12px;margin-top:6px;padding:6px 8px;background:rgba(233,69,96,0.1);border-radius:4px">⚠️ ' + frag.tips + '</div>';
  h += '</div>';
  return h;
}

async function sendScreenshotHelp(fileId, dataUrl) {
  if (isStreaming) return;
  removeWelcome();

  addMessage("user", '<i style="color:var(--text-dim)">📷 右侧页面截图</i><br><img src="' + dataUrl + '" style="max-width:100%;border-radius:8px;margin-top:4px">', true);

  isStreaming = true;
  btnSend.disabled = true;
  var aiMsg = addTyping();
  var fullAnswer = "";

  try {
    // ===== 调用1：分类 =====
    var catalog = await getCatalog();

    var classifyPrompt = "请分析这张截图，判断它属于以下哪个操作步骤。\n\n" +
      "步骤分类目录：\n" + catalog + "\n" +
      "请根据截图中的界面元素（标题、按钮、字段、选项等），判断当前截图最匹配哪个步骤。\n\n" +
      "只返回JSON，不要其他文字：\n" +
      '{"matched_id": 数字ID, "matched_title": "完整复制目录中的title", "confidence": 0.95, "reason": "判断依据"}\n\n' +
      "无法判断时返回：{\"matched_id\": null, \"matched_title\": null, \"confidence\": 0, \"reason\": \"无法识别\"}";

    log("screenshot", "调用1: 分类 (blocking)");
    log("screenshot", "调用1 prompt: " + classifyPrompt);
    var classifyResp = await apiFetch("v1/chat-messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        query: classifyPrompt,
        response_mode: "blocking",
        user: USER,
        inputs: {},
        files: [{ type: "image", transfer_method: "local_file", upload_file_id: fileId }]
      })
    });

    var classifyJson = await classifyResp.json();
    var classifyAnswer = classifyJson.answer || "";
    log("screenshot", "分类原始返回: " + classifyAnswer.substring(0, 300));

    // 解析分类结果
    var matchData = null;
    try {
      var jm = classifyAnswer.match(/\{[\s\S]*\}/);
      if (jm) matchData = JSON.parse(jm[0]);
    } catch(e) {
      log("screenshot", "JSON解析失败: " + e.message);
    }

    var contextInfo = "";
    var reason = "";

    if (matchData && matchData.matched_id) {
      // 查找 fragment 详情
      var lookupResp = await fetch("/api/lookup-fragment", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: matchData.matched_id, title: matchData.matched_title })
      });
      var lookupResult = await lookupResp.json();
      log("screenshot", "查找结果: " + JSON.stringify(lookupResult).substring(0, 200));

      if (lookupResult.success && lookupResult.fragment) {
        var frag = lookupResult.fragment;
        reason = matchData.reason || "";

        aiMsg.innerHTML = buildRefCard(frag, reason);

        contextInfo = "\n\n【系统已自动匹配到以下参考信息】\n" +
          "步骤: " + (frag.step_label || '') + "\n" +
          "标题: " + (frag.title || '') + "\n" +
          "所属分类: " + (frag.section || '') + "\n";
        if (frag.tips) contextInfo += "⚠️ 注意事项: " + frag.tips + "\n";
        contextInfo += "\n操作说明:\n" + (frag.context_text || '') + "\n";
      }
    }

    // ===== 调用2：推理回答 =====
    var query = "请根据截图内容，结合系统提供的参考信息，给出这个步骤的详细操作指导和注意事项。" + contextInfo;
    var body2 = {
      query: query,
      response_mode: "streaming",
      user: USER,
      inputs: {},
      files: [{ type: "image", transfer_method: "local_file", upload_file_id: fileId }]
    };
    log("screenshot", "调用2 prompt: " + query);
    log("screenshot", "调用2: 推理回答 (streaming)");
    var resp = await apiFetch("v1/chat-messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body2),
    });

    if (!resp.ok) {
      var errBody = await resp.text();
      log("screenshot", "error: " + errBody);
      throw new Error("HTTP " + resp.status + ": " + errBody);
    }

    fullAnswer = "";

    await processStream(resp.body,
      function(answer) {
        fullAnswer += answer;
        var cardEl = aiMsg.querySelector('[data-ref-card]');
        var refCard = cardEl ? cardEl.outerHTML : "";
        aiMsg.innerHTML = refCard + simpleMarkdown(fullAnswer);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      },
      function() {},
      function(msg) {
        fullAnswer += "<br><span style='color:#e94560'>错误: " + msg + "</span>";
        aiMsg.innerHTML = simpleMarkdown(fullAnswer);
      }
    );
  } catch (error) {
    log("screenshot", "失败: " + error.message);
    aiMsg.innerHTML = simpleMarkdown("<span style='color:#e94560'>截图求助失败: " + error.message + "</span>");
  }

  isStreaming = false;
  btnSend.disabled = false;
}
</script>
